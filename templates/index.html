<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flood Prediction System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:360px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
    color:#333;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#007bff;
}

.result{
    margin-top:20px;
    padding:10px;
    background:#f1f1f1;
    border-radius:6px;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>

<script>
function toggleMode(){
    var mode = document.getElementById("mode").value;

    if(mode === "auto"){
        document.getElementById("autoFields").style.display="block";
        document.getElementById("manualFields").style.display="none";
    }else{
        document.getElementById("autoFields").style.display="none";
        document.getElementById("manualFields").style.display="block";
    }
}
</script>

</head>

<body>

<div class="container">

<h2>🌊 Flood Prediction System</h2>

<form method="POST">

<label>Select Prediction Mode</label>
<select name="mode" id="mode" onchange="toggleMode()">
<option value="auto">Automatic (City)</option>
<option value="manual">Manual (Enter Data)</option>
</select>

<!-- Automatic Mode -->
<div id="autoFields">
<input type="text" name="city" placeholder="Enter City (e.g. Kochi)">
</div>

<!-- Manual Mode -->
<div id="manualFields" class="hidden">

<input type="number" step="any" name="max_temp" placeholder="Max Temperature">
<input type="number" step="any" name="min_temp" placeholder="Min Temperature">
<input type="number" step="any" name="rainfall" placeholder="Rainfall">
<input type="number" step="any" name="humidity" placeholder="Humidity">
<input type="number" step="any" name="wind_speed" placeholder="Wind Speed">

</div>

<button type="submit">Predict Flood Risk</button>

</form>

{% if result %}
<div class="result">
Prediction Result: {{ result }}
</div>
{% endif %}

</div>

</body>
</html>
